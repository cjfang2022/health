<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>血壓心率健康紀錄管理工具</title>
  
  <!-- 載入 Tailwind CSS (排版美化) -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 載入 React 與 ReactDOM 核心 (鎖定穩定的 18.3.1 版本) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- 載入 Babel (鎖定穩定的 7.26.4 版本，避免未來的解析器無預警變更規格) -->
  <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js" crossorigin></script>

  <!-- 載入 PDF 導出專用核心庫 (html2canvas & jsPDF) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

  <style>
    /* 隱藏滾動條但保持滾動功能 (用於頂部導航欄行動版體驗) */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;  /* IE and Edge */
      scrollbar-width: none;  /* Firefox */
    }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <!-- React 程式碼區塊 -->
  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef } = React;

    // ----------------------------------------------------
    // 模擬數據：僅在使用者第一次打開、且本地完全無資料時預載
    // ----------------------------------------------------
    const generateMockData = () => {
      const data = [];
      const now = new Date();
      for (let i = 13; i >= 0; i--) {
        const date = new Date(now);
        date.setDate(now.getDate() - i);
        const dateStr = date.toISOString().split('T')[0];
                
        const morningCount = 2;
        const morningReadings = [
          { systolic: 122, diastolic: 80, pulse: 68 },
          { systolic: 118, diastolic: 78, pulse: 66 }
        ];
        data.push({
          id: `${dateStr}-morning`,
          date: dateStr,
          period: 'morning',
          readings: morningReadings,
          avgSystolic: Math.round(morningReadings.reduce((sum, r) => sum + r.systolic, 0) / morningCount),
          avgDiastolic: Math.round(morningReadings.reduce((sum, r) => sum + r.diastolic, 0) / morningCount),
          avgPulse: Math.round(morningReadings.reduce((sum, r) => sum + r.pulse, 0) / morningCount),
        });

        const eveningCount = 2;
        const eveningReadings = [
          { systolic: 116, diastolic: 75, pulse: 72 },
          { systolic: 114, diastolic: 73, pulse: 70 }
        ];
        data.push({
          id: `${dateStr}-evening`,
          date: dateStr,
          period: 'evening',
          readings: eveningReadings,
          avgSystolic: Math.round(eveningReadings.reduce((sum, r) => sum + r.systolic, 0) / eveningCount),
          avgDiastolic: Math.round(eveningReadings.reduce((sum, r) => sum + r.diastolic, 0) / eveningCount),
          avgPulse: Math.round(eveningReadings.reduce((sum, r) => sum + r.pulse, 0) / eveningCount),
        });
      }
      return data;
    };

    // ----------------------------------------------------
    // 血壓等級判定邏輯 (AHA/ACC 標準)
    // ----------------------------------------------------
    const getBPLevel = (sys, dia) => {
      if (sys >= 180 || dia >= 120) {
        return { label: '高血壓危機', color: 'text-rose-600 bg-rose-50 border-rose-200', dotColor: '#e11d48' };
      }
      if (sys >= 140 || dia >= 90) {
        return { label: '二期高血壓', color: 'text-red-500 bg-red-50 border-red-200', dotColor: '#ef4444' };
      }
      if ((sys >= 130 && sys <= 139) || (dia >= 80 && dia <= 89)) {
        return { label: '一期高血壓', color: 'text-amber-500 bg-amber-50 border-amber-200', dotColor: '#f59e0b' };
      }
      if ((sys >= 120 && sys <= 129) && dia < 80) {
        return { label: '血壓偏高', color: 'text-yellow-500 bg-yellow-50 border-yellow-200', dotColor: '#eab308' };
      }
      return { label: '正常血壓', color: 'text-emerald-500 bg-emerald-50 border-emerald-200', dotColor: '#10b981' };
    };

    // ----------------------------------------------------
    // 貝茲平滑曲線演算器 (Catmull-Rom 改良算法)
    // ----------------------------------------------------
    const formatBezierPath = (points) => {
      if (points.length === 0) return '';
      if (points.length === 1) return `M ${points[0].x} ${points[0].y}`;
      if (points.length === 2) return `M ${points[0].x} ${points[0].y} L ${points[1].x} ${points[1].y}`;
      
      let d = `M ${points[0].x} ${points[0].y}`;
      for (let i = 0; i < points.length - 1; i++) {
        const p0 = points[i === 0 ? i : i - 1];
        const p1 = points[i];
        const p2 = points[i + 1];
        const p3 = points[i + 2 >= points.length ? i + 1 : i + 2];
        
        // 切線張力控制係數
        const cp1x = p1.x + (p2.x - p0.x) * 0.15;
        const cp1y = p1.y + (p2.y - p0.y) * 0.15;
        const cp2x = p2.x - (p3.x - p1.x) * 0.15;
        const cp2y = p2.y - (p3.y - p1.y) * 0.15;
        
        d += ` C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${p2.x} ${p2.y}`;
      }
      return d;
    };

    function App() {
      // ----------------------------------------------------
      // 狀態管理 (LocalStorage 優先)
      // ----------------------------------------------------
      const [records, setRecords] = useState(() => {
        const local = localStorage.getItem('bp_tracker_records_v2');
        return local ? JSON.parse(local) : generateMockData();
      });

      const [gasUrl, setGasUrl] = useState(() => {
        return localStorage.getItem('bp_tracker_gas_url') || '';
      });

      const [securityKey, setSecurityKey] = useState(() => {
        return localStorage.getItem('bp_tracker_security_key') || '';
      });

      // UI 與同步狀態
      const [activeTab, setActiveTab] = useState('dashboard');
      const [syncLoading, setSyncLoading] = useState(false);
      const [notification, setNotification] = useState(null); 
      const [customConfirm, setCustomConfirm] = useState(null); 
      const [customAlert, setCustomAlert] = useState(null); 

      // 詳細紀錄預設排序：'desc' (由新到舊)
      const [sortOrder, setSortOrder] = useState('desc'); 

      // 篩選器狀態
      const [datePreset, setDatePreset] = useState('14days');
      const [startDate, setStartDate] = useState(() => {
        const d = new Date();
        d.setDate(d.getDate() - 13);
        return d.toISOString().split('T')[0];
      });
      const [endDate, setEndDate] = useState(new Date().toISOString().split('T')[0]);
      const [filterPeriod, setFilterPeriod] = useState('all');
      const [filterMetric, setFilterMetric] = useState('all');
            
      // 表單狀態
      const [showModal, setShowModal] = useState(false);
      const [editId, setEditId] = useState(null);
      const [formDate, setFormDate] = useState(new Date().toISOString().split('T')[0]);
      const [formPeriod, setFormPeriod] = useState(() => {
        const hour = new Date().getHours();
        return hour < 12 ? 'morning' : 'evening';
      });
      const [formReadings, setFormReadings] = useState([
        { systolic: 120, diastolic: 80, pulse: 70 }
      ]);

      // 互動式圖表指標狀態
      const [hoveredIndex, setHoveredIndex] = useState(null);
      const [tooltipPos, setTooltipPos] = useState({ x: 0, y: 0 });

      // ----------------------------------------------------
      // 自動將變更寫入 LocalStorage
      // ----------------------------------------------------
      useEffect(() => {
        localStorage.setItem('bp_tracker_records_v2', JSON.stringify(records));
      }, [records]);

      useEffect(() => {
        localStorage.setItem('bp_tracker_gas_url', gasUrl);
      }, [gasUrl]);

      useEffect(() => {
        localStorage.setItem('bp_tracker_security_key', securityKey);
      }, [securityKey]);

      const triggerNotification = (type, text) => {
        setNotification({ type, text });
        setTimeout(() => {
          setNotification(null);
        }, 4000);
      };

      const handlePresetChange = (preset) => {
        setDatePreset(preset);
        const today = new Date();
        const endStr = today.toISOString().split('T')[0];
        setEndDate(endStr);

        if (preset === '7days') {
          const d = new Date(); d.setDate(today.getDate() - 6);
          setStartDate(d.toISOString().split('T')[0]);
        } else if (preset === '14days') {
          const d = new Date(); d.setDate(today.getDate() - 13);
          setStartDate(d.toISOString().split('T')[0]);
        } else if (preset === '30days') {
          const d = new Date(); d.setDate(today.getDate() - 29);
          setStartDate(d.toISOString().split('T')[0]);
        } else if (preset === '90days') {
          const d = new Date(); d.setMonth(today.getMonth() - 3);
          setStartDate(d.toISOString().split('T')[0]);
        } else if (preset === 'all') {
          if (records.length === 0) {
            setStartDate(endStr);
          } else {
            const dates = records.map(r => r.date).sort();
            setStartDate(dates[0]);
          }
        }
      };

      // ----------------------------------------------------
      // 核心功能：差異增量合併同步處理
      // ----------------------------------------------------
      const handleCloudSync = async () => {
        if (!gasUrl) {
          setCustomAlert({
            title: "尚未設定雲端網址",
            message: "請前往「雲端安全設定」分頁，貼上您的 Google Apps Script 部署網址再進行同步。"
          });
          return;
        }

        if (!securityKey || securityKey.trim() === "") {
          setCustomAlert({
            title: "⚠️ 安全防護：密鑰不可空白",
            message: "為了保護您的個人醫療隱私，當您啟用雲端同步功能時，「安全密鑰（密碼）」絕不可留空。請至『雲端安全設定』設定您的密碼。"
          });
          return;
        }

        setSyncLoading(true);
        triggerNotification('info', '正在比對本地與雲端數據差異...');

        try {
          const trimmedKey = securityKey.trim();
          const fetchUrl = `${gasUrl}?key=${encodeURIComponent(trimmedKey)}`;
          const response = await fetch(fetchUrl);
                    
          if (!response.ok) {
            throw new Error(`雲端連線失敗 (HTTP ${response.status})`);
          }
                    
          const cloudData = await response.json();
                    
          if (cloudData && cloudData.status === 'error') {
            setCustomAlert({
              title: "❌ 雲端驗證失敗",
              message: cloudData.message
            });
            triggerNotification('error', '驗證不通過，存取被拒。');
            setSyncLoading(false);
            return;
          }

          const remoteRecords = Array.isArray(cloudData) ? cloudData : [];
          const remoteMap = new Map(remoteRecords.map(r => [r.id, r]));
          const localMap = new Map(records.map(r => [r.id, r]));

          const localChanges = [];
          records.forEach(localRec => {
            const remoteRec = remoteMap.get(localRec.id);
            if (!remoteRec || JSON.stringify(localRec.readings) !== JSON.stringify(remoteRec.readings)) {
              localChanges.push(localRec);
            }
          });

          const cloudOnlyRecords = [];
          remoteRecords.forEach(remoteRec => {
            if (!localMap.has(remoteRec.id)) {
              cloudOnlyRecords.push(remoteRec);
            }
          });

          let updatedRecordsList = [...records];
          let updatedInCloud = 0;

          if (localChanges.length > 0) {
            triggerNotification('info', `正在增量上傳 ${localChanges.length} 筆變更數據至試算表...`);
                        
            const payload = {
              action: 'upsertRecords',
              key: trimmedKey,
              records: localChanges
            };

            const postResponse = await fetch(gasUrl, {
              method: 'POST',
              headers: { 'Content-Type': 'text/plain;charset=utf-8' },
              body: JSON.stringify(payload)
            });

            if (!postResponse.ok) {
              throw new Error(`上傳差異失敗 (HTTP ${postResponse.status})`);
            }

            const postResult = await postResponse.json();
            if (postResult && postResult.status === 'success') {
              updatedInCloud = localChanges.length;
            } else {
              throw new Error(postResult ? postResult.message : '雲端寫入異常');
            }
          }

          if (cloudOnlyRecords.length > 0) {
            updatedRecordsList = [...cloudOnlyRecords, ...updatedRecordsList];
          }

          if (localChanges.length > 0 || cloudOnlyRecords.length > 0) {
            setRecords(updatedRecordsList);
            triggerNotification('success', `✨ 智慧同步成功！雲端更新 ${updatedInCloud} 筆，本地下載合併 ${cloudOnlyRecords.length} 筆。`);
          } else {
            triggerNotification('success', '✨ 數據已是最新狀態，本地與雲端完全一致。');
          }

        } catch (error) {
          console.error(error);
          setCustomAlert({
            title: "❌ 同步連線失敗",
            message: `錯誤詳情：${error.message}。\n\n請前往「安全設定分頁」複製並部署最新的 Google Apps Script 增量腳本。`
          });
          triggerNotification('error', '差異同步失敗。');
        } finally {
          setSyncLoading(false);
        }
      };

      const handleCloudExportAll = async () => {
        setCustomConfirm({
          message: "此為全覆蓋操作，會清除雲端試算表並整批重新上傳本地所有資料，確定要繼續嗎？",
          onConfirm: async () => {
            setCustomConfirm(null);
            setSyncLoading(true);
            triggerNotification('info', '正在全量覆蓋上傳雲端...');
            try {
              const trimmedKey = securityKey.trim();
              const payload = {
                action: 'saveAll',
                key: trimmedKey, 
                records: records
              };
              const response = await fetch(gasUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload)
              });
              const result = await response.json();
              if (result && result.status === 'success') {
                triggerNotification('success', '✨ 雲端試算表全量覆蓋備份成功！');
              } else {
                triggerNotification('error', '備份失敗');
              }
            } catch (err) {
              triggerNotification('error', '連線失敗');
            } finally {
              setSyncLoading(false);
            }
          }
        });
      };

      const handleCloudImportAll = async () => {
        setCustomConfirm({
          message: "確定要清空本地資料，並從雲端強制重新下載全部紀錄嗎？",
          onConfirm: async () => {
            setCustomConfirm(null);
            setSyncLoading(true);
            try {
              const trimmedKey = securityKey.trim();
              const fetchUrl = `${gasUrl}?key=${encodeURIComponent(trimmedKey)}`;
              const response = await fetch(fetchUrl);
              const cloudData = await response.json();
              if (cloudData && Array.isArray(cloudData)) {
                setRecords(cloudData);
                triggerNotification('success', '✨ 成功重新抓取並覆蓋本地全部紀錄！');
              } else {
                triggerNotification('error', '讀取失敗');
              }
            } catch (e) {
              triggerNotification('error', '下載失敗');
            } finally {
              setSyncLoading(false);
            }
          }
        });
      };

      const toggleSortOrder = () => {
        setSortOrder(prev => prev === 'desc' ? 'asc' : 'desc');
        triggerNotification('info', `已切換為 ${sortOrder === 'desc' ? '遞增排序 (舊到新)' : '遞減排序 (新到舊)'}`);
      };

      const filteredRecords = useMemo(() => {
        let result = records.filter(r => {
          const isWithinDate = r.date >= startDate && r.date <= endDate;
          const isWithinPeriod = filterPeriod === 'all' || r.period === filterPeriod;
          return isWithinDate && isWithinPeriod;
        });

        return result.sort((a, b) => {
          const dateA = new Date(a.date);
          const dateB = new Date(b.date);
          if (a.date !== b.date) {
            return sortOrder === 'desc' ? dateB - dateA : dateA - dateB;
          }
          const periodOrder = sortOrder === 'desc'
            ? (a.period === 'evening' ? -1 : 1)
            : (a.period === 'morning' ? -1 : 1);
          return periodOrder;
        });
      }, [records, startDate, endDate, filterPeriod, sortOrder]);

      // ----------------------------------------------------
      // 計算 PDF 表格切割區塊 (每頁20筆以確保 A4 不斷行)
      // ----------------------------------------------------
      const pdfTableChunks = useMemo(() => {
        if (filteredRecords.length === 0) return [[]];
        const chunkSize = 20; 
        const chunks = [];
        for (let i = 0; i < filteredRecords.length; i += chunkSize) {
          chunks.push(filteredRecords.slice(i, i + chunkSize));
        }
        return chunks;
      }, [filteredRecords]);

      // ----------------------------------------------------
      // A4 專業級分頁式 PDF 報告導出邏輯
      // ----------------------------------------------------
      const handleExportPDF = async () => {
        setSyncLoading(true);
        triggerNotification('info', '正在動態分頁渲染，準備產生 A4 臨床級健康報告...');

        const pdfArea = document.getElementById('pdf-report-area');
        pdfArea.classList.remove('hidden');

        try {
          await new Promise(resolve => setTimeout(resolve, 1000));

          const pages = pdfArea.querySelectorAll('.pdf-page-container');
          const { jsPDF } = window.jspdf;
          
          const pdf = new jsPDF('p', 'mm', 'a4');
          const imgWidth = 210;
          const imgHeight = 297;

          for (let i = 0; i < pages.length; i++) {
            const pageElement = pages[i];
            
            const canvas = await html2canvas(pageElement, {
              scale: 2.2, 
              useCORS: true,
              allowTaint: true,
              logging: false,
              backgroundColor: '#ffffff'
            });

            const imgData = canvas.toDataURL('image/jpeg', 1.0);
            
            if (i > 0) {
              pdf.addPage();
            }
            pdf.addImage(imgData, 'JPEG', 0, 0, imgWidth, imgHeight);
          }

          const filename = `血壓健康報告_${startDate}_至_${endDate}.pdf`;
          pdf.save(filename);
          triggerNotification('success', '🎉 臨床級 A4 PDF 健康報告導出成功，分頁完整且無斷行裂痕！');

        } catch (error) {
          console.error(error);
          triggerNotification('error', 'PDF 生成失敗，請確認是否安裝必要的外部庫 or 重試。');
        } finally {
          pdfArea.classList.add('hidden');
          setSyncLoading(false);
        }
      };

      const groupedChartData = useMemo(() => {
        const groups = {};
        filteredRecords.forEach(r => {
          if (!groups[r.date]) {
            groups[r.date] = { date: r.date, morning: null, evening: null };
          }
          if (r.period === 'morning') {
            groups[r.date].morning = r;
          } else if (r.period === 'evening') {
            groups[r.date].evening = r;
          }
        });
        return Object.values(groups).sort((a, b) => new Date(a.date) - new Date(b.date));
      }, [filteredRecords]);

      const stats = useMemo(() => {
        const result = {
          mornSysAvg: 0, mornDiaAvg: 0, mornPulseAvg: 0, mornCount: 0,
          evenSysAvg: 0, evenDiaAvg: 0, evenPulseAvg: 0, evenCount: 0,
          totalSysAvg: 0, totalDiaAvg: 0, totalPulseAvg: 0, totalCount: 0,
        };

        let mSys = 0, mDia = 0, mPulse = 0;
        let eSys = 0, eDia = 0, ePulse = 0;
                
        filteredRecords.forEach(r => {
          if (r.period === 'morning') {
            mSys += r.avgSystolic;
            mDia += r.avgDiastolic;
            mPulse += r.avgPulse;
            result.mornCount++;
          } else {
            eSys += r.avgSystolic;
            eDia += r.avgDiastolic;
            ePulse += r.avgPulse;
            result.evenCount++;
          }
        });

        result.totalCount = result.mornCount + result.evenCount;

        if (result.mornCount > 0) {
          result.mornSysAvg = Math.round(mSys / result.mornCount);
          result.mornDiaAvg = Math.round(mDia / result.mornCount);
          result.mornPulseAvg = Math.round(mPulse / result.mornCount);
        }
        if (result.evenCount > 0) {
          result.evenSysAvg = Math.round(eSys / result.evenCount);
          result.evenDiaAvg = Math.round(eDia / result.evenCount);
          result.evenPulseAvg = Math.round(ePulse / result.evenCount);
        }
        if (result.totalCount > 0) {
          result.totalSysAvg = Math.round((mSys + eSys) / result.totalCount);
          result.totalDiaAvg = Math.round((mDia + eDia) / result.totalCount);
          result.totalPulseAvg = Math.round((mPulse + ePulse) / result.totalCount);
        }

        return result;
      }, [filteredRecords]);

      const openAddModal = () => {
        setEditId(null);
        setFormDate(new Date().toISOString().split('T')[0]);
        const hour = new Date().getHours();
        setFormPeriod(hour < 12 ? 'morning' : 'evening');
        setFormReadings([{ systolic: 120, diastolic: 80, pulse: 70 }]);
        setShowModal(true);
      };

      const openEditModal = (record) => {
        setEditId(record.id);
        setFormDate(record.date);
        setFormPeriod(record.period);
        setFormReadings(record.readings.map(r => ({ ...r })));
        setShowModal(true);
      };

      const handleAddReadingField = () => {
        const lastReading = formReadings[formReadings.length - 1] || { systolic: 120, diastolic: 80, pulse: 70 };
        setFormReadings([...formReadings, { ...lastReading }]);
      };

      const handleRemoveReadingField = (index) => {
        if (formReadings.length === 1) return;
        setFormReadings(formReadings.filter((_, i) => i !== index));
      };

      const handleReadingChange = (index, field, value) => {
        const updated = [...formReadings];
        updated[index][field] = value === '' ? '' : parseInt(value, 10);
        setFormReadings(updated);
      };

      const saveRecord = (e) => {
        e.preventDefault();
                
        const validReadings = formReadings.map(r => ({
          systolic: typeof r.systolic === 'number' && !isNaN(r.systolic) ? r.systolic : 120,
          diastolic: typeof r.diastolic === 'number' && !isNaN(r.diastolic) ? r.diastolic : 80,
          pulse: typeof r.pulse === 'number' && !isNaN(r.pulse) ? r.pulse : 70
        }));

        const count = validReadings.length;
        const avgSystolic = Math.round(validReadings.reduce((sum, r) => sum + r.systolic, 0) / count);
        const avgDiastolic = Math.round(validReadings.reduce((sum, r) => sum + r.diastolic, 0) / count);
        const avgPulse = Math.round(validReadings.reduce((sum, r) => sum + r.pulse, 0) / count);

        const newRecord = {
          id: editId || `${formDate}-${formPeriod}`,
          date: formDate,
          period: formPeriod,
          readings: validReadings,
          avgSystolic,
          avgDiastolic,
          avgPulse
        };

        if (editId) {
          setRecords(records.map(r => r.id === editId ? newRecord : r));
          triggerNotification('success', '量測紀錄更新成功！');
        } else {
          const existsIndex = records.findIndex(r => r.date === formDate && r.period === formPeriod);
          if (existsIndex > -1) {
            setCustomConfirm({
              message: `您已記錄過 ${formDate} 的 ${formPeriod === 'morning' ? '早上' : '晚上'} 量測，要覆蓋舊紀錄嗎？`,
              onConfirm: () => {
                const updated = [...records];
                updated[existsIndex] = newRecord;
                setRecords(updated);
                setCustomConfirm(null);
                triggerNotification('success', '已覆蓋並更新今日紀錄！');
              }
            });
          } else {
            setRecords([newRecord, ...records]);
            triggerNotification('success', '新增量測成功！');
          }
        }
        setShowModal(false);
      };

      const handleDeleteRecord = (id) => {
        setCustomConfirm({
          message: '確定要刪除這筆量測紀錄嗎？這只會先變更本機資料，建議刪除後再次手動一鍵同步至雲端。',
          onConfirm: () => {
            setRecords(records.filter(r => r.id !== id));
            setCustomConfirm(null);
            triggerNotification('success', '紀錄已刪除。');
          }
        });
      };

      const currentFormAvg = useMemo(() => {
        const nums = formReadings.filter(r => typeof r.systolic === 'number' && typeof r.diastolic === 'number' && typeof r.pulse === 'number');
        if (nums.length === 0) return { sys: 0, dia: 0, pulse: 0 };
        return {
          sys: Math.round(nums.reduce((sum, r) => sum + r.systolic, 0) / nums.length),
          dia: Math.round(nums.reduce((sum, r) => sum + r.diastolic, 0) / nums.length),
          pulse: Math.round(nums.reduce((sum, r) => sum + r.pulse, 0) / nums.length)
        };
      }, [formReadings]);

      // SVG 趨勢圖表基礎渲染 (升級平滑貝茲曲線與十字對齊準星)
      const renderSVGChart = (type, isForPDF = false) => {
        if (groupedChartData.length === 0) {
          return (
            <div className="h-64 flex flex-col items-center justify-center text-slate-400 bg-slate-50 rounded-xl border border-dashed border-slate-200">
              <span className="text-sm">此時間範圍內無篩選資料</span>
            </div>
          );
        }

        const paddingLeft = 50;
        const paddingRight = 30;
        const paddingTop = 20;
        const paddingBottom = 45;
        const width = isForPDF ? 1000 : 800; 
        const height = 300;
                
        const chartWidth = width - paddingLeft - paddingRight;
        const chartHeight = height - paddingTop - paddingBottom;

        let minVal = 50;
        let maxVal = 170;
        let yTicks = [60, 80, 100, 120, 140, 160];

        if (type !== 'bp') {
          minVal = 40;
          maxVal = 130;
          yTicks = [50, 70, 90, 110, 130];
        }

        const getX = (index) => {
          if (groupedChartData.length <= 1) return paddingLeft + chartWidth / 2;
          return paddingLeft + (index / (groupedChartData.length - 1)) * chartWidth;
        };

        const getY = (val) => {
          if (val === null || val === undefined) return null;
          return paddingTop + chartHeight - ((val - minVal) / (maxVal - minVal)) * chartHeight;
        };

        const generateBezierPathString = (key, subKey) => {
          const points = [];
          groupedChartData.forEach((d, idx) => {
            const item = d[key];
            if (item) {
              const val = item[subKey];
              const x = getX(idx);
              const y = getY(val);
              if (y !== null) points.push({ x, y });
            }
          });
          return formatBezierPath(points);
        };

        // 滑鼠與觸控事件的共用座標對齊解析邏輯
        const handleInteraction = (clientX, clientY, rectWidth, rectHeight, rectLeft, rectTop) => {
          const relativeX = clientX - rectLeft;
          const svgX = (relativeX / rectWidth) * width;

          let closestIdx = 0;
          let minDiff = Infinity;
          groupedChartData.forEach((_, idx) => {
            const diff = Math.abs(getX(idx) - svgX);
            if (diff < minDiff) {
              minDiff = diff;
              closestIdx = idx;
            }
          });

          setHoveredIndex(closestIdx);

          const tooltipX = getX(closestIdx);
          const relativeY = clientY - rectTop;
          const svgY = (relativeY / rectHeight) * height;
          setTooltipPos({ 
            x: tooltipX > width - 180 ? tooltipX - 170 : tooltipX + 15, 
            y: Math.min(Math.max(svgY - 50, paddingTop), height - paddingBottom - 100) 
          });
        };

        const handleMouseMove = (e) => {
          if (isForPDF) return;
          const svgEl = e.currentTarget;
          const rect = svgEl.getBoundingClientRect();
          handleInteraction(e.clientX, e.clientY, rect.width, rect.height, rect.left, rect.top);
        };

        const handleTouchMove = (e) => {
          if (isForPDF || !e.touches || e.touches.length === 0) return;
          const svgEl = e.currentTarget;
          const rect = svgEl.getBoundingClientRect();
          const touch = e.touches[0];
          handleInteraction(touch.clientX, touch.clientY, rect.width, rect.height, rect.left, rect.top);
        };

        return (
          <div className="relative">
            {/* 行動端橫向滑動滾動盒，限制 min-w 跑版並使圖表可流暢滑動 */}
            <div className="relative w-full overflow-x-auto pb-2 scrollbar-thin">
              <svg 
                viewBox={`0 0 ${width} ${height}`} 
                className="w-full min-w-[650px] h-auto select-none overflow-visible"
                onMouseMove={handleMouseMove}
                onMouseLeave={() => setHoveredIndex(null)}
                onTouchMove={handleTouchMove}
                onTouchStart={handleTouchMove}
              >
                {/* 1. 網格輔助水平線 */}
                {yTicks.map(tick => {
                  const y = getY(tick);
                  return (
                    <g key={tick}>
                      <line x1={paddingLeft} y1={y} x2={width - paddingRight} y2={y} stroke="#f1f5f9" strokeWidth="1" />
                      <line x1={paddingLeft} y1={y} x2={paddingLeft - 6} y2={y} stroke="#334155" strokeWidth="1.5" />
                      <text x={paddingLeft - 12} y={y + 4} textAnchor="end" className="text-[10px] fill-slate-800 font-bold">{tick}</text>
                    </g>
                  );
                })}

                {/* 2. X軸主刻度與日期刻度文字 */}
                {groupedChartData.map((d, idx) => {
                  const x = getX(idx);
                  const interval = Math.ceil(groupedChartData.length / 8);
                  const showLabel = idx % interval === 0 || idx === groupedChartData.length - 1;
                  const dateObj = new Date(d.date);
                  const formattedDate = `${dateObj.getMonth() + 1}/${dateObj.getDate()}`;

                  return (
                    <g key={d.date}>
                      <line x1={x} y1={height - paddingBottom} x2={x} y2={height - paddingBottom + 6} stroke="#334155" strokeWidth="1.5" />
                      {showLabel && (
                        <text x={x} y={height - paddingBottom + 20} textAnchor="middle" className="text-[10px] fill-slate-800 font-bold">
                          {formattedDate}
                        </text>
                      )}
                    </g>
                  );
                })}

                {/* 3. 高對比 Y軸與 X軸 主邊界線 */}
                <line x1={paddingLeft} y1={paddingTop} x2={paddingLeft} y2={height - paddingBottom} stroke="#334155" strokeWidth="2" />
                <line x1={paddingLeft} y1={height - paddingBottom} x2={width - paddingRight} y2={height - paddingBottom} stroke="#334155" strokeWidth="2" />

                {/* 4. 醫學理想標準參考基準線 */}
                {type === 'bp' ? (
                  <>
                    <line x1={paddingLeft} y1={getY(120)} x2={width - paddingRight} y2={getY(120)} stroke="#ea580c" strokeDasharray="6 4" strokeWidth="2" opacity="0.8" />
                    <line x1={paddingLeft} y1={getY(80)} x2={width - paddingRight} y2={getY(80)} stroke="#0891b2" strokeDasharray="6 4" strokeWidth="2" opacity="0.8" />
                  </>
                ) : (
                  <line x1={paddingLeft} y1={getY(70)} x2={width - paddingRight} y2={getY(70)} stroke="#059669" strokeDasharray="6 4" strokeWidth="2" opacity="0.8" />
                )}

                {/* 5. 互動式十字準星輔助線 (滑鼠/觸控懸浮對齊) */}
                {!isForPDF && hoveredIndex !== null && (
                  <g>
                    <line 
                      x1={getX(hoveredIndex)} 
                      y1={paddingTop} 
                      x2={getX(hoveredIndex)} 
                      y2={height - paddingBottom} 
                      stroke="#cbd5e1" 
                      strokeWidth="1.5" 
                      strokeDasharray="3 3"
                    />
                  </g>
                )}

                {/* 6. 實際量測平滑貝茲數據曲線渲染 */}
                {type === 'bp' ? (
                  <>
                    {/* 早上收縮壓 */}
                    {(filterPeriod === 'all' || filterPeriod === 'morning') && (
                      <>
                        <path d={generateBezierPathString('morning', 'avgSystolic')} fill="none" stroke="#f43f5e" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />
                        {groupedChartData.map((d, idx) => {
                          const y = getY(d.morning?.avgSystolic);
                          return y !== null ? (
                            <circle key={`m-sys-${idx}`} cx={getX(idx)} cy={y} r={!isForPDF && hoveredIndex === idx ? 6 : 4} fill="#f43f5e" stroke="#ffffff" strokeWidth="1.5" className="transition-all duration-150" />
                          ) : null;
                        })}
                      </>
                    )}
                    {/* 早上舒張壓 */}
                    {(filterPeriod === 'all' || filterPeriod === 'morning') && (
                      <>
                        <path d={generateBezierPathString('morning', 'avgDiastolic')} fill="none" stroke="#3b82f6" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />
                        {groupedChartData.map((d, idx) => {
                          const y = getY(d.morning?.avgDiastolic);
                          return y !== null ? (
                            <circle key={`m-dia-${idx}`} cx={getX(idx)} cy={y} r={!isForPDF && hoveredIndex === idx ? 6 : 4} fill="#3b82f6" stroke="#ffffff" strokeWidth="1.5" className="transition-all duration-150" />
                          ) : null;
                        })}
                      </>
                    )}
                    {/* 晚上收縮壓 (深紅虛線平滑波形) */}
                    {(filterPeriod === 'all' || filterPeriod === 'evening') && (
                      <>
                        <path d={generateBezierPathString('evening', 'avgSystolic')} fill="none" stroke="#9f1239" strokeWidth="2" strokeDasharray="6 3" strokeLinecap="round" strokeLinejoin="round" />
                        {groupedChartData.map((d, idx) => {
                          const y = getY(d.evening?.avgSystolic);
                          return y !== null ? (
                            <circle key={`e-sys-${idx}`} cx={getX(idx)} cy={y} r={!isForPDF && hoveredIndex === idx ? 6 : 4} fill="#9f1239" stroke="#ffffff" strokeWidth="1.5" className="transition-all duration-150" />
                          ) : null;
                        })}
                      </>
                    )}
                    {/* 晚上舒張壓 (深藍虛線平滑波形) */}
                    {(filterPeriod === 'all' || filterPeriod === 'evening') && (
                      <>
                        <path d={generateBezierPathString('evening', 'avgDiastolic')} fill="none" stroke="#1d4ed8" strokeWidth="2" strokeDasharray="6 3" strokeLinecap="round" strokeLinejoin="round" />
                        {groupedChartData.map((d, idx) => {
                          const y = getY(d.evening?.avgDiastolic);
                          return y !== null ? (
                            <circle key={`e-dia-${idx}`} cx={getX(idx)} cy={y} r={!isForPDF && hoveredIndex === idx ? 6 : 4} fill="#1d4ed8" stroke="#ffffff" strokeWidth="1.5" className="transition-all duration-150" />
                          ) : null;
                        })}
                      </>
                    )}
                  </>
                ) : (
                  <>
                    {/* 早上心率 */}
                    {(filterPeriod === 'all' || filterPeriod === 'morning') && (
                      <>
                        <path d={generateBezierPathString('morning', 'avgPulse')} fill="none" stroke="#ec4899" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />
                        {groupedChartData.map((d, idx) => {
                          const y = getY(d.morning?.avgPulse);
                          return y !== null ? (
                            <circle key={`m-pulse-${idx}`} cx={getX(idx)} cy={y} r={!isForPDF && hoveredIndex === idx ? 6 : 4} fill="#ec4899" stroke="#ffffff" strokeWidth="1.5" className="transition-all duration-150" />
                          ) : null;
                        })}
                      </>
                    )}
                    {/* 晚上心率 */}
                    {(filterPeriod === 'all' || filterPeriod === 'evening') && (
                      <>
                        <path d={generateBezierPathString('evening', 'avgPulse')} fill="none" stroke="#8b5cf6" strokeWidth="2" strokeDasharray="6 3" strokeLinecap="round" strokeLinejoin="round" />
                        {groupedChartData.map((d, idx) => {
                          const y = getY(d.evening?.avgPulse);
                          return y !== null ? (
                            <circle key={`e-pulse-${idx}`} cx={getX(idx)} cy={y} r={!isForPDF && hoveredIndex === idx ? 6 : 4} fill="#8b5cf6" stroke="#ffffff" strokeWidth="1.5" className="transition-all duration-150" />
                          ) : null;
                        })}
                      </>
                    )}
                  </>
                )}
              </svg>

              {/* 7. 智慧 HTML 浮動對齊提示面板 (Tooltip) */}
              {!isForPDF && hoveredIndex !== null && groupedChartData[hoveredIndex] && (
                <div 
                  className="absolute z-40 bg-slate-900/90 text-white p-3 rounded-xl shadow-xl border border-slate-700 pointer-events-none text-xs backdrop-blur-xs min-w-[155px] space-y-2 transition-all duration-100 ease-out"
                  style={{ left: `${(tooltipPos.x / width) * 100}%`, top: `${tooltipPos.y}px` }}
                >
                  <div className="font-black border-b border-slate-700 pb-1 text-[11px] tracking-wide text-slate-300">
                    🗓️ {groupedChartData[hoveredIndex].date}
                  </div>
                  
                  {/* 早上數據摘要 */}
                  {groupedChartData[hoveredIndex].morning ? (
                    <div className="space-y-0.5">
                      <div className="text-amber-400 font-bold text-[10px] flex items-center gap-1">🌞 早上量測 <span className="text-[9px] text-slate-400">({groupedChartData[hoveredIndex].morning.readings.length}次)</span></div>
                      <div className="font-mono text-[11px] pl-3">
                        血壓: <strong className="text-white text-xs">{groupedChartData[hoveredIndex].morning.avgSystolic}/{groupedChartData[hoveredIndex].morning.avgDiastolic}</strong>
                      </div>
                      {type !== 'bp' && (
                        <div className="font-mono text-[11px] pl-3 text-slate-300">
                          心率: <span className="text-pink-400">{groupedChartData[hoveredIndex].morning.avgPulse} bpm</span>
                        </div>
                      )}
                    </div>
                  ) : (
                    <div className="text-slate-500 text-[10px] italic">🌞 早上無紀錄</div>
                  )}

                  {/* 晚上數據摘要 */}
                  {groupedChartData[hoveredIndex].evening ? (
                    <div className="space-y-0.5 pt-1 border-t border-slate-800/60">
                      <div className="text-indigo-400 font-bold text-[10px] flex items-center gap-1">🌙 晚上量測 <span className="text-[9px] text-slate-400">({groupedChartData[hoveredIndex].evening.readings.length}次)</span></div>
                      <div className="font-mono text-[11px] pl-3">
                        血壓: <strong className="text-white text-xs">{groupedChartData[hoveredIndex].evening.avgSystolic}/{groupedChartData[hoveredIndex].evening.avgDiastolic}</strong>
                      </div>
                      {type !== 'bp' && (
                        <div className="font-mono text-[11px] pl-3 text-slate-300">
                          心率: <span className="text-purple-400">{groupedChartData[hoveredIndex].evening.avgPulse} bpm</span>
                        </div>
                      )}
                    </div>
                  ) : (
                    <div className="text-slate-500 text-[10px] italic">🌙 晚上無紀錄</div>
                  )}
                </div>
              )}
            </div>
          </div>
        );
      };

      const renderChartWithLegend = (type, isForPDF = false) => {
        const isBP = type === 'bp';
        return (          
          <div className="space-y-4">
            <div className={`flex flex-wrap gap-x-4 gap-y-2 text-xs bg-slate-50 p-3 rounded-xl border border-slate-100 ${isForPDF ? 'bg-white border-slate-200' : ''}`}>
              {isBP ? (
                <>
                  {(filterPeriod === 'all' || filterPeriod === 'morning') && (
                    <div className="flex items-center gap-1.5">
                      <span className="w-3 h-3 rounded-full bg-[#f43f5e] inline-block shrink-0"></span>
                      <span className="font-bold text-slate-700">🌞 早上收縮壓</span>
                    </div>
                  )}
                  {(filterPeriod === 'all' || filterPeriod === 'morning') && (
                    <div className="flex items-center gap-1.5">
                      <span className="w-3 h-3 rounded-full bg-[#3b82f6] inline-block shrink-0"></span>
                      <span className="font-bold text-slate-700">🌞 早上舒張壓</span>
                    </div>
                  )}
                  {(filterPeriod === 'all' || filterPeriod === 'evening') && (
                    <div className="flex items-center gap-1.5">
                      <span className="w-3.5 h-1.5 inline-block bg-[#9f1239] rounded shrink-0"></span>
                      <span className="font-bold text-slate-700">🌙 晚上收縮壓 (虛線)</span>
                    </div>
                  )}
                  {(filterPeriod === 'all' || filterPeriod === 'evening') && (
                    <div className="flex items-center gap-1.5">
                      <span className="w-3.5 h-1.5 inline-block bg-[#1d4ed8] rounded shrink-0"></span>
                      <span className="font-bold text-slate-700">🌙 晚上舒張壓 (虛線)</span>
                    </div>
                  )}
                  <div className="flex items-center gap-1.5 border-l border-slate-200 pl-3 ml-1">
                    <span className="w-5 h-0.5 inline-block border-t-2 border-dashed border-[#ea580c] shrink-0"></span>
                    <span className="font-bold text-orange-700">理想高壓標準線 (120 mmHg)</span>
                  </div>
                  <div className="flex items-center gap-1.5">
                    <span className="w-5 h-0.5 inline-block border-t-2 border-dashed border-[#0891b2] shrink-0"></span>
                    <span className="font-bold text-cyan-700">理想低壓標準線 (80 mmHg)</span>
                  </div>
                </>
              ) : (
                <>
                  {(filterPeriod === 'all' || filterPeriod === 'morning') && (
                    <div className="flex items-center gap-1.5">
                      <span className="w-3 h-3 rounded-full bg-[#ec4899] inline-block shrink-0"></span>
                      <span className="font-bold text-slate-700">🌞 早上心率</span>
                    </div>
                  )}
                  {(filterPeriod === 'all' || filterPeriod === 'evening') && (
                    <div className="flex items-center gap-1.5">
                      <span className="w-3.5 h-1.5 inline-block bg-[#8b5cf6] rounded shrink-0"></span>
                      <span className="font-bold text-slate-700">🌙 晚上心率 (虛線)</span>
                    </div>
                  )}
                  <div className="flex items-center gap-1.5 border-l border-slate-200 pl-3 ml-1">
                    <span className="w-5 h-0.5 inline-block border-t-2 border-dashed border-[#059669] shrink-0"></span>
                    <span className="font-bold text-emerald-700">正常靜止心率參考線 (70 bpm)</span>
                  </div>
                </>
              )}
            </div>

            {/* SVG 趨勢折線圖 */}
            {renderSVGChart(type, isForPDF)}
          </div>
        );
      };

      return (
        <div className="min-h-screen bg-slate-50 text-slate-800 font-sans antialiased">
          {/* 頂部全域通知 */}
          {notification && (
            <div className={`fixed top-4 left-1/2 transform -translate-x-1/2 z-50 px-6 py-3 rounded-full shadow-xl text-xs font-bold transition-all duration-300 flex items-center gap-2 border ${
              notification.type === 'success' ? 'bg-emerald-500 text-white border-emerald-400' :
              notification.type === 'error' ? 'bg-rose-500 text-white border-rose-400' :
              'bg-slate-900 text-white border-slate-800'
            }`}>
              {syncLoading && (
                <svg className="animate-spin h-3.5 w-3.5 text-white mr-1" fill="none" viewBox="0 0 24 24">
                  <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" />
                  <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" />
                </svg>
              )}
              {notification.text}
            </div>
          )}

          <header className="bg-white border-b border-slate-100 shadow-sm sticky top-0 z-30">
            <div className="max-w-6xl mx-auto px-4 py-4 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center gap-3">
                <div className="p-2.5 bg-rose-500 rounded-2xl text-white shadow-md shadow-rose-100">
                  <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                  </svg>
                </div>
                <div>
                  <div className="flex items-center gap-2">
                    <h1 className="text-xl font-bold tracking-tight text-slate-900">血壓心率健康紀錄管理工具</h1>
                    {gasUrl ? (
                      <span className="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-[10px] font-bold bg-emerald-50 text-emerald-600 border border-emerald-200">
                        <span className="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-ping"></span>
                        雲端安全同步中
                      </span>
                    ) : (
                      <span className="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-[10px] font-bold bg-blue-50 text-blue-600 border border-blue-200">
                        <span className="w-1.5 h-1.5 bg-blue-500 rounded-full"></span>
                        瀏覽器本地儲存中
                      </span>
                    )}
                  </div>
                  <p className="text-xs text-slate-500 font-medium">支援每日多次量測平均、趨勢分析與智慧增量加密同步</p>
                </div>
              </div>
              
              {/* 導導欄容器：支援窄螢幕無損橫向滾動 */}
              <div className="flex items-center bg-slate-100 p-1 rounded-xl overflow-x-auto max-w-full no-scrollbar whitespace-nowrap">
                <button 
                  onClick={() => setActiveTab('dashboard')}
                  className={`px-4 py-1.5 rounded-lg text-sm font-semibold transition-all duration-200 shrink-0 ${activeTab === 'dashboard' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-600 hover:text-slate-900'}`}
                >
                  健康儀表板
                </button>
                <button 
                  onClick={() => setActiveTab('history')}
                  className={`px-4 py-1.5 rounded-lg text-sm font-semibold transition-all duration-200 shrink-0 ${activeTab === 'history' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-600 hover:text-slate-900'}`}
                >
                  詳細紀錄
                </button>

// 🛡️ 最重要安全設定：請在下方引號中設定您的安全密鑰 (自訂密碼)
// ==========================================
var SECURITY_KEY = "您的自訂安全密碼_請務必修改此處"; 

function doGet(e) {
  var clientKey = e.parameter ? e.parameter.key : "";
  if (!clientKey || clientKey.toString().trim() !== SECURITY_KEY.trim()) {
    return ContentService.createTextOutput(JSON.stringify({
      status: "error", 
      message: "拒絕存取：您提供的小工具安全密鑰與雲端不一致！請檢查空白或大小寫。"
    })).setMimeType(ContentService.MimeType.JSON);
  }

  try {
    var sheet = SpreadsheetApp.getActiveSpreadsheet().getActiveSheet();
    var data = sheet.getDataRange().getValues();
    var records = [];
    if (data.length > 1) {
      for (var i = 1; i < data.length; i++) {
        try {
          records.push({
            id: data[i][0] ? data[i][0].toString() : "",
            date: Utilities.formatDate(new Date(data[i][1]), Session.getScriptTimeZone(), "yyyy-MM-dd"),
            period: data[i][2] ? data[i][2].toString() : "",
            avgSystolic: parseInt(data[i][3]) || 0,
            avgDiastolic: parseInt(data[i][4]) || 0,
            avgPulse: parseInt(data[i][5]) || 0,
            readings: JSON.parse(data[i][6] || "[]")
          });
        } catch(err) {}
      }
    }
    return ContentService.createTextOutput(JSON.stringify(records)).setMimeType(ContentService.MimeType.JSON);
  } catch (err) {
    return ContentService.createTextOutput(JSON.stringify({
      status: "error",
      message: "讀取試算表失敗：" + err.toString()
    })).setMimeType(ContentService.MimeType.JSON);
  }
}

function doPost(e) {
  try {
    if (!e || !e.postData || !e.postData.contents) {
      return ContentService.createTextOutput(JSON.stringify({status: "error", message: "無傳輸內容"})).setMimeType(ContentService.MimeType.JSON);
    }

    var params = JSON.parse(e.postData.contents);
    var clientKey = params.key;
    if (!clientKey || clientKey.toString().trim() !== SECURITY_KEY.trim()) {
      return ContentService.createTextOutput(JSON.stringify({status: "error", message: "安全驗證失敗"})).setMimeType(ContentService.MimeType.JSON);
    }

    var sheet = SpreadsheetApp.getActiveSpreadsheet().getActiveSheet();
    
    // 行級差異/增量更新
    if (params.action === "upsertRecords") {
      var data = sheet.getDataRange().getValues();
      var idRowMap = {};
      for (var i = 1; i < data.length; i++) {
        if (data[i][0]) {
          idRowMap[data[i][0].toString()] = i + 1;
        }
      }

      var recordsToUpdate = params.records;
      for (var j = 0; j < recordsToUpdate.length; j++) {
        var r = recordsToUpdate[j];
        var rowIndex = idRowMap[r.id];
        var rowData = [r.id, r.date, r.period, r.avgSystolic, r.avgDiastolic, r.avgPulse, JSON.stringify(r.readings)];
        
        if (rowIndex) {
          sheet.getRange(rowIndex, 1, 1, 7).setValues([rowData]);
        } else {
          sheet.appendRow(rowData);
        }
      }
      return ContentService.createTextOutput(JSON.stringify({status: "success", count: recordsToUpdate.length})).setMimeType(ContentService.MimeType.JSON);
    }

    if (params.action === "saveAll") {
      sheet.clear();
      sheet.appendRow(["ID", "Date", "Period", "Avg Systolic", "Avg Diastolic", "Avg Pulse", "Raw Readings JSON"]);
      var records = params.records;
      for (var i = 0; i < records.length; i++) {
        var r = records[i];
        sheet.appendRow([r.id, r.date, r.period, r.avgSystolic, r.avgDiastolic, r.avgPulse, JSON.stringify(r.readings)]);
      }
      return ContentService.createTextOutput(JSON.stringify({status: "success"})).setMimeType(ContentService.MimeType.JSON);
    }
    
    return ContentService.createTextOutput(JSON.stringify({status: "error", message: "未知指令"})).setMimeType(ContentService.MimeType.JSON);
  } catch(err) {
    return ContentService.createTextOutput(JSON.stringify({status: "error", message: err.toString()})).setMimeType(ContentService.MimeType.JSON);
  }
}`}</pre>

                <p className="text-xs text-slate-500 leading-relaxed">{customConfirm.message}</p>
                <div className="flex gap-2">
                  <button onClick={() => setCustomConfirm(null)} className="flex-1 bg-slate-100 text-slate-600 py-2 rounded-lg text-xs font-bold">取消</button>
                  <button onClick={customConfirm.onConfirm} className="flex-1 bg-rose-500 text-white py-2 rounded-lg text-xs font-bold">確定</button>
                </div>
              </div>
            </div>
          )}

          {customAlert && (
            <div className="fixed inset-0 z-50 bg-slate-900/40 backdrop-blur-xs flex items-center justify-center p-4">
              <div className="bg-white rounded-2xl w-full max-w-sm p-6 shadow-xl border border-slate-100 space-y-4">
                <h4 className="text-sm font-black text-slate-900 flex items-center gap-1.5 text-rose-500">⚠️ {customAlert.title}</h4>
                <p className="text-xs text-slate-500 leading-relaxed">{customAlert.message}</p>
                <button onClick={() => setCustomAlert(null)} className="w-full bg-slate-900 text-white py-2 rounded-lg text-xs font-bold">我知道了</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
