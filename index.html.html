<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>血壓心率健康紀錄管理工具</title>
  
  <!-- 載入 Tailwind CSS (排版美化) -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 載入 React 與 ReactDOM 核心 -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- 載入 Babel (用於在瀏覽器中即時解析 JSX 語法) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <!-- React 程式碼區塊 -->
  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    // ----------------------------------------------------
    // 模擬數據：僅在使用者第一次打開、且本地完全無資料時預載
    // ----------------------------------------------------
    const generateMockData = () => {
      const data = [];
      const now = new Date();
      for (let i = 13; i >= 0; i--) {
        const date = new Date(now);
        date.setDate(now.getDate() - i);
        const dateStr = date.toISOString().split('T')[0];
        
        const morningCount = 2;
        const morningReadings = [
          { systolic: 122, diastolic: 80, pulse: 68 },
          { systolic: 118, diastolic: 78, pulse: 66 }
        ];
        data.push({
          id: `${dateStr}-morning`,
          date: dateStr,
          period: 'morning',
          readings: morningReadings,
          avgSystolic: Math.round(morningReadings.reduce((sum, r) => sum + r.systolic, 0) / morningCount),
          avgDiastolic: Math.round(morningReadings.reduce((sum, r) => sum + r.diastolic, 0) / morningCount),
          avgPulse: Math.round(morningReadings.reduce((sum, r) => sum + r.pulse, 0) / morningCount),
        });

        const eveningCount = 2;
        const eveningReadings = [
          { systolic: 116, diastolic: 75, pulse: 72 },
          { systolic: 114, diastolic: 73, pulse: 70 }
        ];
        data.push({
          id: `${dateStr}-evening`,
          date: dateStr,
          period: 'evening',
          readings: eveningReadings,
          avgSystolic: Math.round(eveningReadings.reduce((sum, r) => sum + r.systolic, 0) / eveningCount),
          avgDiastolic: Math.round(eveningReadings.reduce((sum, r) => sum + r.diastolic, 0) / eveningCount),
          avgPulse: Math.round(eveningReadings.reduce((sum, r) => sum + r.pulse, 0) / eveningCount),
        });
      }
      return data;
    };

    // ----------------------------------------------------
    // 血壓等級判定邏輯 (AHA/ACC 標準)
    // ----------------------------------------------------
    const getBPLevel = (sys, dia) => {
      if (sys >= 180 || dia >= 120) {
        return { label: '高血壓危機', color: 'text-rose-600 bg-rose-50 border-rose-200', dotColor: '#e11d48' };
      }
      if (sys >= 140 || dia >= 90) {
        return { label: '二期高血壓', color: 'text-red-500 bg-red-50 border-red-200', dotColor: '#ef4444' };
      }
      if ((sys >= 130 && sys <= 139) || (dia >= 80 && dia <= 89)) {
        return { label: '一期高血壓', color: 'text-amber-500 bg-amber-50 border-amber-200', dotColor: '#f59e0b' };
      }
      if ((sys >= 120 && sys <= 129) && dia < 80) {
        return { label: '血壓偏高', color: 'text-yellow-500 bg-yellow-50 border-yellow-200', dotColor: '#eab308' };
      }
      return { label: '正常血壓', color: 'text-emerald-500 bg-emerald-50 border-emerald-200', dotColor: '#10b981' };
    };

    function App() {
      // ----------------------------------------------------
      // 狀態管理 (雙驅動儲存：LocalStorage 優先)
      // ----------------------------------------------------
      const [records, setRecords] = useState(() => {
        const local = localStorage.getItem('bp_tracker_records_v2');
        return local ? JSON.parse(local) : generateMockData();
      });

      const [gasUrl, setGasUrl] = useState(() => {
        return localStorage.getItem('bp_tracker_gas_url') || '';
      });

      // 安全密鑰狀態 (自訂驗證密碼)
      const [securityKey, setSecurityKey] = useState(() => {
        return localStorage.getItem('bp_tracker_security_key') || '';
      });

      // UI 與同步狀態
      const [activeTab, setActiveTab] = useState('dashboard'); // 'dashboard' | 'history' | 'cloud' | 'guide'
      const [syncLoading, setSyncLoading] = useState(false);
      const [notification, setNotification] = useState(null); // { type: 'success'|'error'|'info', text: string }
      
      // 自訂對話框/確認框
      const [customConfirm, setCustomConfirm] = useState(null); 
      const [customAlert, setCustomAlert] = useState(null); 

      // 篩選器狀態
      const [datePreset, setDatePreset] = useState('14days');
      const [startDate, setStartDate] = useState(() => {
        const d = new Date();
        d.setDate(d.getDate() - 13);
        return d.toISOString().split('T')[0];
      });
      const [endDate, setEndDate] = useState(new Date().toISOString().split('T')[0]);
      const [filterPeriod, setFilterPeriod] = useState('all');
      const [filterMetric, setFilterMetric] = useState('all');
      
      // 表單狀態
      const [showModal, setShowModal] = useState(false);
      const [editId, setEditId] = useState(null);
      const [formDate, setFormDate] = useState(new Date().toISOString().split('T')[0]);
      const [formPeriod, setFormPeriod] = useState(() => {
        const hour = new Date().getHours();
        return hour < 12 ? 'morning' : 'evening';
      });
      const [formReadings, setFormReadings] = useState([
        { systolic: 120, diastolic: 80, pulse: 70 }
      ]);

      const [hoveredIndex, setHoveredIndex] = useState(null);

      // ----------------------------------------------------
      // 自動將變更寫入 LocalStorage
      // ----------------------------------------------------
      useEffect(() => {
        localStorage.setItem('bp_tracker_records_v2', JSON.stringify(records));
      }, [records]);

      useEffect(() => {
        localStorage.setItem('bp_tracker_gas_url', gasUrl);
      }, [gasUrl]);

      useEffect(() => {
        localStorage.setItem('bp_tracker_security_key', securityKey);
      }, [securityKey]);

      // ----------------------------------------------------
      // 通知提示框自動關閉
      // ----------------------------------------------------
      const triggerNotification = (type, text) => {
        setNotification({ type, text });
        setTimeout(() => {
          setNotification(null);
        }, 4000);
      };

      // ----------------------------------------------------
      // GOOGLE SHEET 雲端同步核心 API
      // ----------------------------------------------------
      
      // 1. 匯出當前全部紀錄至 Google Sheets
      const handleCloudExport = async () => {
        if (!gasUrl) {
          setCustomAlert({
            title: "尚未設定雲端網址",
            message: "請前往「雲端安全設定」分頁，貼上您的 Google Apps Script 部署網址再進行同步。"
          });
          return;
        }

        if (!securityKey || securityKey.trim() === "") {
          setCustomAlert({
            title: "⚠️ 安全防護：密鑰不可空白",
            message: "為了保護您的個人醫療隱私，當您啟用雲端同步功能時，「安全密鑰（密碼）」絕不可留空。請至『雲端安全設定』設定您的密碼。"
          });
          return;
        }

        setSyncLoading(true);
        triggerNotification('info', '正在將資料加密上傳至 Google 試算表...');

        try {
          const trimmedKey = securityKey.trim();

          const payload = {
            action: 'saveAll',
            key: trimmedKey, 
            records: records
          };

          const response = await fetch(gasUrl, {
            method: 'POST',
            headers: {
              'Content-Type': 'text/plain;charset=utf-8',
            },
            body: JSON.stringify(payload)
          });

          if (!response.ok) {
            throw new Error(`伺服器錯誤 (HTTP ${response.status})`);
          }

          const result = await response.json();

          if (result && result.status === 'success') {
            triggerNotification('success', '✨ 一鍵同步成功！已為您安全備份至雲端。');
          } else {
            setCustomAlert({
              title: "❌ 雲端同步失敗",
              message: result ? result.message : "雲端試算表未回應成功狀態，請確認設定。"
            });
            triggerNotification('error', '雲端同步驗證失敗！');
          }
        } catch (error) {
          console.error(error);
          setCustomAlert({
            title: "❌ 雲端連接失敗",
            message: `上傳時發生錯誤：${error.message}。請確認：\n1. 您的 Google 部署網址是否正確。\n2. 部署時是否設定為「所有人 (Anyone)」均可存取。\n3. 您在 GAS 程式碼中是否設定了正確的密鑰。`
          });
          triggerNotification('error', '雲端同步失敗。');
        } finally {
          setSyncLoading(false);
        }
      };

      // 2. 從 Google Sheets 下載歷史紀錄
      const handleCloudImport = async () => {
        if (!gasUrl) {
          setCustomAlert({
            title: "尚未設定雲端網址",
            message: "請前往「雲端安全設定」分頁，貼上您的 Google Apps Script 部署網址再進行同步。"
          });
          return;
        }

        if (!securityKey || securityKey.trim() === "") {
          setCustomAlert({
            title: "⚠️ 安全防護：密鑰不可空白",
            message: "欲從雲端取得資料，請先在左側填入您對應的安全密鑰，以進行身分解密。"
          });
          return;
        }

        setCustomConfirm({
          message: "確定要從雲端還原資料嗎？這將會覆蓋您目前瀏覽器上的紀錄（建議先將現有紀錄進行匯出備份）。",
          onConfirm: async () => {
            setSyncLoading(true);
            triggerNotification('info', '正在驗證安全密鑰並從雲端讀取紀錄...');
            try {
              const trimmedKey = securityKey.trim();
              const fetchUrl = `${gasUrl}?key=${encodeURIComponent(trimmedKey)}`;
              
              const response = await fetch(fetchUrl);
              if (!response.ok) {
                throw new Error(`伺服器回應異常 (HTTP ${response.status})`);
              }
              
              const cloudData = await response.json();
              
              if (cloudData && cloudData.status === 'error') {
                setCustomAlert({
                  title: "❌ 雲端驗證失敗",
                  message: cloudData.message
                });
                triggerNotification('error', '驗證不通過，存取被拒。');
                return;
              }
              
              if (Array.isArray(cloudData)) {
                if (cloudData.length === 0) {
                  triggerNotification('info', '雲端試算表目前為空，無可還原資料。');
                } else {
                  setRecords(cloudData);
                  triggerNotification('success', `✨ 還原成功！已載入 ${cloudData.length} 筆歷史紀錄。`);
                }
              } else {
                triggerNotification('error', '格式不符，請確認安全密鑰是否正確。');
              }
            } catch (error) {
              console.error(error);
              setCustomAlert({
                title: "❌ 讀取失敗",
                message: `連線時發生錯誤：${error.message}。\n請確認：\n1. 您的「自訂安全密鑰（密碼）」是否與 Google Apps Script 中設定的完全一致。\n2. 您在 Apps Script 編輯程式碼後，是否有執行「建立新版本」並重新部署。`
              });
              triggerNotification('error', '讀取失敗。');
            } finally {
              setSyncLoading(false);
              setCustomConfirm(null);
            }
          }
        });
      };

      // ----------------------------------------------------
      // 日期快速預設處理
      // ----------------------------------------------------
      const handlePresetChange = (preset) => {
        setDatePreset(preset);
        const end = new Date().toISOString().split('T')[0];
        setEndDate(end);
        
        const start = new Date();
        if (preset === '7days') {
          start.setDate(start.getDate() - 6);
          setStartDate(start.toISOString().split('T')[0]);
        } else if (preset === '14days') {
          start.setDate(start.getDate() - 13);
          setStartDate(start.toISOString().split('T')[0]);
        } else if (preset === '30days') {
          start.setDate(start.getDate() - 29);
          setStartDate(start.toISOString().split('T')[0]);
        } else if (preset === '90days') {
          start.setDate(start.getDate() - 89);
          setStartDate(start.toISOString().split('T')[0]);
        } else if (preset === 'all') {
          if (records.length > 0) {
            const sorted = [...records].sort((a, b) => new Date(a.date) - new Date(b.date));
            setStartDate(sorted[0].date);
          } else {
            start.setDate(start.getDate() - 30);
            setStartDate(start.toISOString().split('T')[0]);
          }
        }
      };

      // ----------------------------------------------------
      // 數據過濾與排序
      // ----------------------------------------------------
      const filteredRecords = useMemo(() => {
        let result = records.filter(r => {
          const isWithinDate = r.date >= startDate && r.date <= endDate;
          const isWithinPeriod = filterPeriod === 'all' || r.period === filterPeriod;
          return isWithinDate && isWithinPeriod;
        });

        return result.sort((a, b) => {
          if (a.date !== b.date) {
            return new Date(a.date) - new Date(b.date);
          }
          return a.period === 'morning' ? -1 : 1;
        });
      }, [records, startDate, endDate, filterPeriod]);

      // 依「日期」分組的數據
      const groupedChartData = useMemo(() => {
        const groups = {};
        filteredRecords.forEach(r => {
          if (!groups[r.date]) {
            groups[r.date] = { date: r.date, morning: null, evening: null };
          }
          if (r.period === 'morning') {
            groups[r.date].morning = r;
          } else if (r.period === 'evening') {
            groups[r.date].evening = r;
          }
        });
        return Object.values(groups).sort((a, b) => new Date(a.date) - new Date(b.date));
      }, [filteredRecords]);

      // ----------------------------------------------------
      // 量測值統計分析
      // ----------------------------------------------------
      const stats = useMemo(() => {
        const result = {
          mornSysAvg: 0, mornDiaAvg: 0, mornPulseAvg: 0, mornCount: 0,
          evenSysAvg: 0, evenDiaAvg: 0, evenPulseAvg: 0, evenCount: 0,
          totalSysAvg: 0, totalDiaAvg: 0, totalPulseAvg: 0, totalCount: 0,
        };

        let mSys = 0, mDia = 0, mPulse = 0;
        let eSys = 0, eDia = 0, ePulse = 0;
        
        filteredRecords.forEach(r => {
          if (r.period === 'morning') {
            mSys += r.avgSystolic;
            mDia += r.avgDiastolic;
            mPulse += r.avgPulse;
            result.mornCount++;
          } else {
            eSys += r.avgSystolic;
            eDia += r.avgDiastolic;
            ePulse += r.avgPulse;
            result.evenCount++;
          }
        });

        result.totalCount = result.mornCount + result.evenCount;

        if (result.mornCount > 0) {
          result.mornSysAvg = Math.round(mSys / result.mornCount);
          result.mornDiaAvg = Math.round(mDia / result.mornCount);
          result.mornPulseAvg = Math.round(mPulse / result.mornCount);
        }
        if (result.evenCount > 0) {
          result.evenSysAvg = Math.round(eSys / result.evenCount);
          result.evenDiaAvg = Math.round(eDia / result.evenCount);
          result.evenPulseAvg = Math.round(ePulse / result.evenCount);
        }
        if (result.totalCount > 0) {
          result.totalSysAvg = Math.round((mSys + eSys) / result.totalCount);
          result.totalDiaAvg = Math.round((mDia + eDia) / result.totalCount);
          result.totalPulseAvg = Math.round((mPulse + ePulse) / result.totalCount);
        }

        return result;
      }, [filteredRecords]);

      // ----------------------------------------------------
      // 新增/修改表單操作
      // ----------------------------------------------------
      const openAddModal = () => {
        setEditId(null);
        setFormDate(new Date().toISOString().split('T')[0]);
        const hour = new Date().getHours();
        setFormPeriod(hour < 12 ? 'morning' : 'evening');
        setFormReadings([{ systolic: 120, diastolic: 80, pulse: 70 }]);
        setShowModal(true);
      };

      const openEditModal = (record) => {
        setEditId(record.id);
        setFormDate(record.date);
        setFormPeriod(record.period);
        setFormReadings(record.readings.map(r => ({ ...r })));
        setShowModal(true);
      };

      const handleAddReadingField = () => {
        const lastReading = formReadings[formReadings.length - 1] || { systolic: 120, diastolic: 80, pulse: 70 };
        setFormReadings([...formReadings, { ...lastReading }]);
      };

      const handleRemoveReadingField = (index) => {
        if (formReadings.length === 1) return;
        setFormReadings(formReadings.filter((_, i) => i !== index));
      };

      const handleReadingChange = (index, field, value) => {
        const updated = [...formReadings];
        updated[index][field] = value === '' ? '' : parseInt(value, 10);
        setFormReadings(updated);
      };

      const saveRecord = (e) => {
        e.preventDefault();
        
        const validReadings = formReadings.map(r => ({
          systolic: typeof r.systolic === 'number' && !isNaN(r.systolic) ? r.systolic : 120,
          diastolic: typeof r.diastolic === 'number' && !isNaN(r.diastolic) ? r.diastolic : 80,
          pulse: typeof r.pulse === 'number' && !isNaN(r.pulse) ? r.pulse : 70
        }));

        const count = validReadings.length;
        const avgSystolic = Math.round(validReadings.reduce((sum, r) => sum + r.systolic, 0) / count);
        const avgDiastolic = Math.round(validReadings.reduce((sum, r) => sum + r.diastolic, 0) / count);
        const avgPulse = Math.round(validReadings.reduce((sum, r) => sum + r.pulse, 0) / count);

        const newRecord = {
          id: editId || `${formDate}-${formPeriod}`,
          date: formDate,
          period: formPeriod,
          readings: validReadings,
          avgSystolic,
          avgDiastolic,
          avgPulse
        };

        if (editId) {
          setRecords(records.map(r => r.id === editId ? newRecord : r));
          triggerNotification('success', '量測紀錄更新成功！');
        } else {
          const existsIndex = records.findIndex(r => r.date === formDate && r.period === formPeriod);
          if (existsIndex > -1) {
            setCustomConfirm({
              message: `您已記錄過 ${formDate} 的 ${formPeriod === 'morning' ? '早上' : '晚上'} 量測，要覆蓋舊紀錄嗎？`,
              onConfirm: () => {
                const updated = [...records];
                updated[existsIndex] = newRecord;
                setRecords(updated);
                setCustomConfirm(null);
                triggerNotification('success', '已覆蓋並更新今日紀錄！');
              }
            });
          } else {
            setRecords([newRecord, ...records]);
            triggerNotification('success', '新增量測成功！');
          }
        }
        setShowModal(false);
      };

      const handleDeleteRecord = (id) => {
        setCustomConfirm({
          message: '確定要刪除這筆量測紀錄嗎？這只會先變更本機資料，建議刪除後再次手動一鍵同步至雲端。',
          onConfirm: () => {
            setRecords(records.filter(r => r.id !== id));
            setCustomConfirm(null);
            triggerNotification('success', '紀錄已刪除。');
          }
        });
      };

      const currentFormAvg = useMemo(() => {
        const nums = formReadings.filter(r => typeof r.systolic === 'number' && typeof r.diastolic === 'number' && typeof r.pulse === 'number');
        if (nums.length === 0) return { sys: 0, dia: 0, pulse: 0 };
        return {
          sys: Math.round(nums.reduce((sum, r) => sum + r.systolic, 0) / nums.length),
          dia: Math.round(nums.reduce((sum, r) => sum + r.diastolic, 0) / nums.length),
          pulse: Math.round(nums.reduce((sum, r) => sum + r.pulse, 0) / nums.length)
        };
      }, [formReadings]);

      // ----------------------------------------------------
      // SVG 線條繪圖算法 (精準自主渲染)
      // ----------------------------------------------------
      const renderSVGChart = (type) => {
        if (groupedChartData.length === 0) {
          return (
            <div className="h-64 flex flex-col items-center justify-center text-slate-400 bg-slate-50 rounded-xl border border-dashed border-slate-200">
              <svg className="w-12 h-12 mb-2 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
              </svg>
              <span className="text-sm">此時間範圍內無篩選資料</span>
            </div>
          );
        }

        const paddingLeft = 50;
        const paddingRight = 30;
        const paddingTop = 20;
        const paddingBottom = 45;
        const width = 800;
        const height = 300;
        
        const chartWidth = width - paddingLeft - paddingRight;
        const chartHeight = height - paddingTop - paddingBottom;

        let minVal = 40;
        let maxVal = 180;
        let yTicks = [];

        if (type === 'bp') {
          minVal = 50;
          maxVal = 170;
          yTicks = [60, 80, 100, 120, 140, 160];
        } else {
          minVal = 40;
          maxVal = 130;
          yTicks = [50, 70, 90, 110, 130];
        }

        const getX = (index) => {
          if (groupedChartData.length <= 1) return paddingLeft + chartWidth / 2;
          return paddingLeft + (index / (groupedChartData.length - 1)) * chartWidth;
        };

        const getY = (val) => {
          if (val === null || val === undefined) return null;
          return paddingTop + chartHeight - ((val - minVal) / (maxVal - minVal)) * chartHeight;
        };

        const generatePath = (key, subKey) => {
          const points = [];
          groupedChartData.forEach((d, idx) => {
            const item = d[key];
            if (item) {
              const val = item[subKey];
              const x = getX(idx);
              const y = getY(val);
              if (y !== null) {
                points.push({ x, y });
              }
            }
          });
          if (points.length === 0) return '';
          return points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');
        };

        return (
          <div className="relative overflow-x-auto">
            <svg viewBox={`0 0 ${width} ${height}`} className="w-full min-w-[650px] h-auto select-none">
              {yTicks.map(tick => {
                const y = getY(tick);
                return (
                  <g key={tick} className="opacity-40">
                    <line x1={paddingLeft} y1={y} x2={width - paddingRight} y2={y} stroke="#e2e8f0" strokeDasharray="4 4" strokeWidth="1" />

                          type="button"
                          onClick={() => setFormPeriod('morning')}
                          className={`py-1.5 rounded-lg text-xs font-bold transition-all flex items-center justify-center gap-1 ${formPeriod === 'morning' ? 'bg-white text-amber-500 shadow-sm' : 'text-slate-500'}`}
                        >
                          🌞 早上
                        </button>
                        <button
                          type="button"
                          onClick={() => setFormPeriod('evening')}
                          className={`py-1.5 rounded-lg text-xs font-bold transition-all flex items-center justify-center gap-1 ${formPeriod === 'evening' ? 'bg-white text-indigo-500 shadow-sm' : 'text-slate-500'}`}
                        >
                          🌙 晚上
                        </button>
                      </div>
                    </div>
                  </div>

                  <div className="border-t border-slate-100 pt-4 space-y-3">
                    <div className="flex items-center justify-between">
                      <span className="text-xs font-bold text-slate-600">量測數據 (可新增多次取平均值)</span>
                      <button type="button" onClick={handleAddReadingField} className="text-xs text-rose-500 hover:text-rose-600 font-bold">＋ 新增一次量測</button>
                    </div>

                    <div className="max-h-56 overflow-y-auto pr-1 space-y-3">
                      {formReadings.map((reading, index) => (
                        <div key={index} className="bg-slate-50 border border-slate-100 rounded-2xl p-3 relative flex items-center gap-3">
                          <span className="text-xs font-black text-slate-400 bg-slate-200/50 w-5 h-5 rounded-full flex items-center justify-center shrink-0">
                            {index + 1}
                          </span>

                          <div className="grid grid-cols-3 gap-2 flex-1">
                            <div className="flex flex-col gap-1">
                              <span className="text-[10px] font-bold text-slate-500 text-center">收縮壓 (高壓)</span>
                              <input 
                                type="number" required min="50" max="250"
                                value={reading.systolic}
                                onChange={(e) => handleReadingChange(index, 'systolic', e.target.value)}
                                className="bg-white border border-slate-200 rounded-lg py-1 px-2 text-center text-sm font-bold text-slate-800"
                              />
                            </div>
                            <div className="flex flex-col gap-1">
                              <span className="text-[10px] font-bold text-slate-500 text-center">舒張壓 (低壓)</span>
                              <input 
                                type="number" required min="30" max="150"
                                value={reading.diastolic}
                                onChange={(e) => handleReadingChange(index, 'diastolic', e.target.value)}
                                className="bg-white border border-slate-200 rounded-lg py-1 px-2 text-center text-sm font-bold text-slate-800"
                              />
                            </div>
                            <div className="flex flex-col gap-1">
                              <span className="text-[10px] font-bold text-slate-500 text-center">心率 (心跳)</span>
                              <input 
                                type="number" required min="30" max="200"
                                value={reading.pulse}
                                onChange={(e) => handleReadingChange(index, 'pulse', e.target.value)}
                                className="bg-white border border-slate-200 rounded-lg py-1 px-2 text-center text-sm font-bold text-slate-800"
                              />
                            </div>
                          </div>

                          {formReadings.length > 1 && (
                            <button type="button" onClick={() => handleRemoveReadingField(index)} className="text-rose-400 hover:text-rose-600">🗑️</button>
                          )}
                        </div>
                      ))}
                    </div>
                  </div>

                  <div className="bg-rose-50/50 rounded-2xl p-4 border border-rose-100 flex items-center justify-between">
                    <div>
                      <h4 className="text-xs font-extrabold text-slate-700">本次量測平均結果 ($n={formReadings.length}$)</h4>
                      <p className="text-[10px] text-slate-400 mt-0.5">儲存後系統將自動將平均值繪製進趨勢圖</p>
                    </div>
                    <div className="text-right">
                      <div className="text-sm font-black text-slate-800">
                        {currentFormAvg.sys} / {currentFormAvg.dia} <span className="text-xs text-slate-400 font-bold">mmHg</span>
                      </div>
                      <div className="text-xs font-bold text-slate-500 mt-0.5">
                        心率: {currentFormAvg.pulse} <span className="text-[10px]">bpm</span>
                      </div>
                    </div>
                  </div>

                  <div className="flex gap-3 pt-2">
                    <button type="button" onClick={() => setShowModal(false)} className="flex-1 bg-slate-100 text-slate-600 py-2.5 rounded-xl font-bold">取消</button>
                    <button type="submit" className="flex-1 bg-rose-500 text-white py-2.5 rounded-xl font-bold shadow-lg shadow-rose-100">儲存並計算平均</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {customConfirm && (
            <div className="fixed inset-0 z-50 bg-slate-900/40 backdrop-blur-xs flex items-center justify-center p-4">
              <div className="bg-white rounded-2xl w-full max-w-sm p-6 shadow-xl border border-slate-100 space-y-4">
                <h4 className="text-sm font-black text-slate-900">確認您的操作</h4>
                <p className="text-xs text-slate-500 leading-relaxed">{customConfirm.message}</p>
                <div className="flex gap-2">
                  <button onClick={() => setCustomConfirm(null)} className="flex-1 bg-slate-100 text-slate-600 py-2 rounded-lg text-xs font-bold">取消</button>
                  <button onClick={customConfirm.onConfirm} className="flex-1 bg-rose-500 text-white py-2 rounded-lg text-xs font-bold">確定</button>
                </div>
              </div>
            </div>
          )}

          {customAlert && (
            <div className="fixed inset-0 z-50 bg-slate-900/40 backdrop-blur-xs flex items-center justify-center p-4">
              <div className="bg-white rounded-2xl w-full max-w-sm p-6 shadow-xl border border-slate-100 space-y-4">
                <h4 className="text-sm font-black text-slate-900 flex items-center gap-1.5 text-rose-500">⚠️ {customAlert.title}</h4>
                <p className="text-xs text-slate-500 leading-relaxed">{customAlert.message}</p>
                <button onClick={() => setCustomAlert(null)} className="w-full bg-slate-900 text-white py-2 rounded-lg text-xs font-bold">我知道了</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    // 將 React 元件掛載到網頁中
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
